<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Municipal Tax Collection System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body data-page="{% block page_name %}default{% endblock %}">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('dashboard_page') }}">Municipal Tax</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0" id="mainNav">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('dashboard_page') }}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('properties_page') }}">Property Details</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('payment_page') }}">Tax Payment</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('history_page') }}">Payment History</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <span class="text-white small" id="userBadge">Welcome</span>
                    <button class="btn btn-light btn-sm d-none" id="logoutButton">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="py-4">
        <div class="container">
            <div id="alertBox"></div>
            {% block content %}{% endblock %}
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
