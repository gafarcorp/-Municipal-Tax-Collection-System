<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Municipal Tax Collection System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body data-page="login" class="auth-body">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="card shadow border-0">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold text-primary">Municipal Tax Collection System</h2>
                            <p class="text-muted mb-0">Login as taxpayer or admin</p>
                        </div>

                        <div id="alertBox"></div>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Role</label>
                                <select class="form-select" id="loginRole" required>
                                    <option value="taxpayer">Taxpayer</option>
                                    <option value="admin">Admin</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email / Username</label>
                                <input type="text" class="form-control" id="loginEmail" placeholder="Enter email or admin username" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" id="loginPassword" placeholder="Enter password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Login</button>
                        </form>

                        <div class="text-center mt-3">
                            <span class="text-muted">New taxpayer?</span>
                            <a href="{{ url_for('register_page') }}" class="fw-semibold">Register here</a>
                        </div>

                        <div class="mt-4 small text-muted">
                            <div>Sample Admin Login:</div>
                            <div>Username: admin</div>
                            <div>Password: admin123</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
